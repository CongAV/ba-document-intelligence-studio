<!DOCTYPE html>
<html>
<head>
  <title>BA Document Intelligence Studio</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    h1 { margin-bottom: 10px; }
    h2 { margin-top: 30px; }
    input, select, textarea { margin: 5px 0; padding: 6px; width: 300px; }
    textarea { height: 80px; }
    button { padding: 6px 12px; margin: 5px 5px 5px 0; cursor: pointer; }
    .card { border: 1px solid #ddd; padding: 10px; margin: 5px 0; cursor: pointer; }
    .breadcrumb { margin-bottom: 20px; font-weight: bold; color: #444; }
  </style>
</head>
<body>

<h1>BA Document Intelligence Studio</h1>
<div class="breadcrumb" id="breadcrumb"></div>
<div id="content"></div>

<script>

let currentProject = null;
let currentDocument = null;
let currentVersion = null;

function setBreadcrumb() {
  let text = "Projects";
  if (currentProject) text += " > " + currentProject.name;
  if (currentDocument) text += " > " + currentDocument.name;
  if (currentVersion) text += " > v" + currentVersion.versionNumber;
  document.getElementById("breadcrumb").innerText = text;
}

/* ================= PROJECTS ================= */

async function loadProjects() {
  currentProject = null;
  currentDocument = null;
  currentVersion = null;
  setBreadcrumb();

  const res = await fetch("/api/projects");
  const projects = await res.json();

  let html = `
    <h2>Create Project</h2>
    <input id="pname" placeholder="Project name"/>
    <textarea id="pdesc" placeholder="Description"></textarea><br>
    <button onclick="createProject()">Create</button>

    <h2>Projects</h2>
  `;

  projects.forEach(p => {
    html += `<div class="card" onclick='openProject(${JSON.stringify(p)})'>
      ${p.name}
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

async function createProject() {
  const name = document.getElementById("pname").value.trim();
  const description = document.getElementById("pdesc").value.trim();

  if (!name) return alert("Project name is required.");

  await fetch("/api/projects", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, description })
  });

  loadProjects();
}

function openProject(project) {
  currentProject = project;
  currentDocument = null;
  currentVersion = null;
  loadDocuments();
}

/* ================= DOCUMENTS ================= */

async function loadDocuments() {
  setBreadcrumb();

  const res = await fetch(`/api/documents/${currentProject.id}`);
  const docs = await res.json();

  let html = `
    <button onclick="loadProjects()">← Back</button>
    <h2>Create Document</h2>
    <input id="dname" placeholder="Document name"/>
    <select id="dtype">
      <option>SRS</option>
      <option>BRD</option>
      <option>FRD</option>
      <option>User Story</option>
      <option>Test Spec</option>
      <option>API Spec</option>
    </select><br>
    <button onclick="createDocument()">Create</button>

    <h2>Documents</h2>
  `;

  docs.forEach(d => {
    html += `<div class="card" onclick='openDocument(${JSON.stringify(d)})'>
      ${d.name} (${d.type})
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

async function createDocument() {
  const name = document.getElementById("dname").value.trim();
  const type = document.getElementById("dtype").value;
  if (!name) return alert("Document name is required.");

  await fetch("/api/documents", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      projectId: currentProject.id,
      name,
      type
    })
  });

  loadDocuments();
}

function openDocument(doc) {
  currentDocument = doc;
  currentVersion = null;
  loadVersions();
}

/* ================= VERSIONS ================= */

async function loadVersions() {
  setBreadcrumb();

  const res = await fetch(`/api/versions/${currentDocument.id}`);
  const versions = await res.json();

  let html = `
    <button onclick="loadDocuments()">← Back</button>
    <h2>Create Version</h2>
    <input id="vnumber" placeholder="Version (e.g., 1.0)"/>
    <textarea id="vlog" placeholder="Change log"></textarea><br>
    <button onclick="createVersion()">Create</button>

    <h2>Versions</h2>
  `;

  versions.forEach(v => {
    html += `<div class="card" onclick='openVersion(${JSON.stringify(v)})'>
      v${v.versionNumber}
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

async function createVersion() {
  const versionNumber = document.getElementById("vnumber").value.trim();
  const changeLog = document.getElementById("vlog").value.trim();
  if (!versionNumber) return alert("Version number is required.");

  await fetch("/api/versions", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      documentId: currentDocument.id,
      versionNumber,
      changeLog
    })
  });

  loadVersions();
}

function openVersion(version) {
  currentVersion = version;
  loadRequirements();
}

/* ================= REQUIREMENTS ================= */

async function loadRequirements() {
  setBreadcrumb();

  const res = await fetch(`/api/requirements/${currentVersion.id}`);
  const reqs = await res.json();

  let html = `
    <button onclick="loadVersions()">← Back</button>
    <button onclick="exportWord()">Export to Word</button>

    <h2>Create Requirement</h2>
    <select id="rtype">
      <option>UC</option>
      <option>US</option>
      <option>AC</option>
      <option>BR</option>
      <option>NFR</option>
    </select><br>
    <input id="rtitle" placeholder="Title"/><br>
    <textarea id="rdesc" placeholder="Description"></textarea><br>
    <select id="rpriority">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>
    <select id="rstatus">
      <option>Draft</option>
      <option>Reviewed</option>
      <option>Approved</option>
    </select><br>
    <button onclick="createRequirement()">Create</button>

    <h2>Requirements</h2>
  `;

  reqs.forEach(r => {
    html += `<div class="card">
      [${r.type}] ${r.title} (${r.priority})
    </div>`;
  });

  document.getElementById("content").innerHTML = html;
}

async function createRequirement() {
  const type = document.getElementById("rtype").value;
  const title = document.getElementById("rtitle").value.trim();
  const description = document.getElementById("rdesc").value.trim();
  const priority = document.getElementById("rpriority").value;
  const status = document.getElementById("rstatus").value;

  if (!title) return alert("Title is required.");
  if (!description) return alert("Description is required.");

  if (type === "US") {
    const pattern = /As a .*I want .*So that .*/i;
    if (!pattern.test(description)) {
      return alert("User Story must follow:\nAs a [role]\nI want [goal]\nSo that [benefit]");
    }
  }

  if (type === "AC") {
    if (!description.includes("Given") ||
        !description.includes("When") ||
        !description.includes("Then")) {
      return alert("Acceptance Criteria must include:\nGiven...\nWhen...\nThen...");
    }
  }

  const res = await fetch(`/api/requirements/${currentVersion.id}`);
  const existing = await res.json();

  if (existing.find(r => r.title.toLowerCase() === title.toLowerCase())) {
    return alert("Duplicate title in this version.");
  }

  await fetch("/api/requirements", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      versionId: currentVersion.id,
      type,
      title,
      description,
      priority,
      status
    })
  });

  loadRequirements();
}

/* ================= EXPORT ================= */

function exportWord() {
  window.location.href = `/api/export/${currentVersion.id}`;
}

loadProjects();

</script>

</body>
</html>
