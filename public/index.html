<!DOCTYPE html>
<html>
<head>
  <title>BA Document Intelligence Studio</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    h1 { margin-bottom: 10px; }
    h2 { margin-top: 30px; }
    input, select, textarea { margin: 5px 0; padding: 6px; width: 320px; }
    textarea { height: 90px; }
    button { padding: 6px 12px; margin: 5px 5px 5px 0; cursor: pointer; }
    .card { border: 1px solid #ddd; padding: 10px; margin: 5px 0; cursor: pointer; }
    .breadcrumb { margin-bottom: 20px; font-weight: bold; color: #444; }
    .ai-box { border: 1px solid #aaa; padding: 15px; margin-top: 15px; background:#f9f9f9; }
    .score { font-size: 20px; font-weight: bold; padding: 5px 10px; border-radius: 5px; display:inline-block; }
    .green { background:#d4edda; color:#155724; }
    .yellow { background:#fff3cd; color:#856404; }
    .red { background:#f8d7da; color:#721c24; }
    .history-item { border-top:1px solid #ddd; padding-top:5px; margin-top:5px; cursor:pointer; }
  </style>
</head>
<body>

<h1>BA Document Intelligence Studio</h1>
<div class="breadcrumb" id="breadcrumb"></div>
<div id="content"></div>

<script>

let currentProject=null;
let currentDocument=null;
let currentVersion=null;

function setBreadcrumb(){
  let text="Projects";
  if(currentProject) text+=" > "+currentProject.name;
  if(currentDocument) text+=" > "+currentDocument.name;
  if(currentVersion) text+=" > v"+currentVersion.versionNumber;
  document.getElementById("breadcrumb").innerText=text;
}

/* ================= PROJECTS ================= */

async function loadProjects(){
  currentProject=null; currentDocument=null; currentVersion=null;
  setBreadcrumb();

  const res=await fetch("/api/projects");
  const projects=await res.json();

  let html=`<h2>Create Project</h2>
  <input id="pname" placeholder="Project name"/>
  <textarea id="pdesc" placeholder="Description"></textarea><br>
  <button onclick="createProject()">Create</button>
  <h2>Projects</h2>`;

  projects.forEach(p=>{
    html+=`<div class="card" onclick='openProject(${JSON.stringify(p)})'>${p.name}</div>`;
  });

  document.getElementById("content").innerHTML=html;
}

async function createProject(){
  const name=document.getElementById("pname").value.trim();
  const description=document.getElementById("pdesc").value.trim();
  if(!name) return alert("Project name required");

  await fetch("/api/projects",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,description})
  });

  loadProjects();
}

function openProject(p){ currentProject=p; loadDocuments(); }

/* ================= DOCUMENTS ================= */

async function loadDocuments(){
  currentDocument=null; currentVersion=null;
  setBreadcrumb();

  const res=await fetch(`/api/documents/${currentProject.id}`);
  const docs=await res.json();

  let html=`<button onclick="loadProjects()">← Back</button>
  <h2>Create Document</h2>
  <input id="dname" placeholder="Document name"/>
  <select id="dtype">
    <option>SRS</option>
    <option>BRD</option>
    <option>FRD</option>
    <option>User Story</option>
  </select><br>
  <button onclick="createDocument()">Create</button>
  <h2>Documents</h2>`;

  docs.forEach(d=>{
    html+=`<div class="card" onclick='openDocument(${JSON.stringify(d)})'>
      ${d.name} (${d.type})
    </div>`;
  });

  document.getElementById("content").innerHTML=html;
}

async function createDocument(){
  const name=document.getElementById("dname").value.trim();
  const type=document.getElementById("dtype").value;
  if(!name) return alert("Document name required");

  await fetch("/api/documents",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({projectId:currentProject.id,name,type})
  });

  loadDocuments();
}

function openDocument(d){ currentDocument=d; loadVersions(); }

/* ================= VERSIONS ================= */

async function loadVersions(){
  currentVersion=null;
  setBreadcrumb();

  const res=await fetch(`/api/versions/${currentDocument.id}`);
  const versions=await res.json();

  let html=`<button onclick="loadDocuments()">← Back</button>
  <h2>Create Version</h2>
  <input id="vnumber" placeholder="Version (1.0)"/>
  <textarea id="vlog" placeholder="Change log"></textarea><br>
  <button onclick="createVersion()">Create</button>
  <h2>Versions</h2>`;

  versions.forEach(v=>{
    html+=`<div class="card" onclick='openVersion(${JSON.stringify(v)})'>
      v${v.versionNumber}
    </div>`;
  });

  document.getElementById("content").innerHTML=html;
}

async function createVersion(){
  const versionNumber=document.getElementById("vnumber").value.trim();
  const changeLog=document.getElementById("vlog").value.trim();
  if(!versionNumber) return alert("Version required");

  await fetch("/api/versions",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({documentId:currentDocument.id,versionNumber,changeLog})
  });

  loadVersions();
}

function openVersion(v){ currentVersion=v; loadRequirements(); }

/* ================= REQUIREMENTS ================= */

async function loadRequirements(){
  setBreadcrumb();

  const res=await fetch(`/api/requirements/${currentVersion.id}`);
  const reqs=await res.json();

  let html=`<button onclick="loadVersions()">← Back</button>
  <button onclick="runAIReview()">AI Review</button>
  <button onclick="exportWord()">Export Word</button>
  <h2>Requirements</h2>`;

  reqs.forEach(r=>{
    html+=`<div class="card">[${r.type}] ${r.title}</div>`;
  });

  html+=`<div id="aiSection"></div>`;
  document.getElementById("content").innerHTML=html;

  loadAIHistory();
}

/* ================= AI REVIEW ================= */

async function runAIReview(){
  document.getElementById("aiSection").innerHTML="Running AI Review...";

  const res=await fetch(`/api/ai-review/${currentVersion.id}`,{method:"POST"});
  const data=await res.json();

  renderAIResult(data);
  loadAIHistory();
}

function renderAIResult(data){
  if(!data.qualityScore){
    document.getElementById("aiSection").innerHTML="<pre>"+JSON.stringify(data,null,2)+"</pre>";
    return;
  }

  let scoreClass="red";
  if(data.qualityScore>=80) scoreClass="green";
  else if(data.qualityScore>=50) scoreClass="yellow";

  document.getElementById("aiSection").innerHTML=`
    <div class="ai-box">
      <div class="score ${scoreClass}">
        Quality Score: ${data.qualityScore}
      </div>
      <p><strong>Summary:</strong> ${data.summary}</p>
    </div>
  `;
}

async function loadAIHistory(){
  const res=await fetch(`/api/ai-reviews/${currentVersion.id}`);
  const history=await res.json();

  if(history.length===0) return;

  let html=`<div class="ai-box"><h3>Review History</h3>`;

  history.forEach(h=>{
    const data=JSON.parse(h.result_json);
    html+=`
      <div class="history-item" onclick='renderAIResult(${JSON.stringify(data)})'>
        ${h.createdAt} — Score: ${h.qualityScore}
      </div>
    `;
  });

  html+="</div>";

  document.getElementById("aiSection").innerHTML+=html;
}

function exportWord(){
  window.location.href=`/api/export/${currentVersion.id}`;
}

loadProjects();

</script>
</body>
</html>
